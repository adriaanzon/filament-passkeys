version: 2
updates:
  - package-ecosystem: 'npm'
    directory: '/'
    schedule:
      interval: 'monthly'
    groups:
      npm-minor:
        update-types:
          - 'minor'
          - 'patch'

  - package-ecosystem: 'composer'
    directory: '/'
    schedule:
      interval: 'monthly'
    versioning-strategy: 'widen'
    groups:
      composer-minor:
        update-types:
          - 'minor'
          - 'patch'

  - package-ecosystem: 'github-actions'
    directory: '/'
    schedule:
      interval: 'monthly'
    groups:
      github-actions:
        patterns:
          - '*'
